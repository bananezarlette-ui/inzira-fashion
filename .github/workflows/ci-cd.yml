name: Inzira Fashion — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Syntax Check ──────────────────────────
  test:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP syntax (all files)
        run: |
          echo "🔍 Running PHP syntax check..."
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file" || exit 1
          done
          echo "✅ All PHP files passed syntax check"

      - name: Validate HTML structure
        run: |
          echo "📄 Checking key files exist..."
          test -f index.php           && echo "✅ index.php"
          test -f database.sql        && echo "✅ database.sql"
          test -f Dockerfile          && echo "✅ Dockerfile"
          test -f docker-compose.yml  && echo "✅ docker-compose.yml"
          test -f assets/css/style.css && echo "✅ style.css"
          test -f assets/js/cart.js   && echo "✅ cart.js"
          echo "✅ File structure validated"

  # ── Job 2: Docker Build ──────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t inzira-fashion:${{ github.sha }} .
          echo "✅ Docker image built successfully"

      - name: Test Docker image starts
        run: |
          docker run -d --name test_app -p 8080:80 \
            -e DB_HOST=localhost -e DB_USER=root -e DB_PASS=pass -e DB_NAME=inzira_fashion \
            inzira-fashion:${{ github.sha }}
          sleep 5
          docker ps | grep test_app && echo "✅ Container is running"
          docker stop test_app

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag inzira-fashion:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/inzira-fashion:latest
          docker tag inzira-fashion:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/inzira-fashion:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/inzira-fashion:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/inzira-fashion:${{ github.sha }}
          echo "✅ Image pushed to Docker Hub"

  # ── Job 3: Deploy ───────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/inzira-fashion
            git pull origin main
            docker compose pull
            docker compose up -d --build
            echo "✅ Deployed successfully at $(date)"
