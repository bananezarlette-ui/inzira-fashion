name: Inzira Fashion — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Check PHP syntax
        run: |
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file" || exit 1
          done
          echo "✅ All PHP files passed"
      - name: Check required files
        run: |
          test -f index.php && echo "✅ index.php"
          test -f database.sql && echo "✅ database.sql"
          test -f Dockerfile && echo "✅ Dockerfile"
          test -f docker-compose.yml && echo "✅ docker-compose.yml"
          test -f assets/css/style.css && echo "✅ style.css"
          test -f admin/index.php && echo "✅ admin panel"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: |
          docker build -t inzira-fashion:latest .
          echo "✅ Docker image built successfully"
      - name: Verify image
        run: |
          docker images inzira-fashion
          echo "✅ Build complete"
